name: Сборка и релиз macOS-приложения

# Запускается при пуше тега вида v1.2.3, либо вручную из вкладки Actions.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например, v1.1.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Сборка приложения
    # Раннер с macOS Tahoe — на нём установлен последний Xcode 26/27.
    runs-on: macos-26
    steps:
      - name: Получение исходников
        uses: actions/checkout@v4

      - name: Выбор последнего Xcode
        run: |
          # Берём максимальную из установленных версий Xcode (26 или 27).
          NEWEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$NEWEST" ]; then
            sudo xcode-select -switch "$NEWEST"
          fi
          echo "Используется:"
          xcodebuild -version
          swift --version

      - name: Определение версии
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Числовая версия без префикса v — попадёт в CFBundleShortVersionString.
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Сборка (Release, ad-hoc подпись)
        run: |
          set -o pipefail
          xcodebuild \
            -project SEOAnalyzer.xcodeproj \
            -scheme SEOAnalyzer \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="${{ steps.ver.outputs.ver }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            clean build

      - name: Сборка DMG-установщика
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/SEOAnalyzer.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Не найдено собранное приложение по пути $APP_PATH"
            find build -name "*.app" -maxdepth 5 || true
            exit 1
          fi

          # Ad-hoc подпись бандла (обязательна для запуска на Apple Silicon).
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH" && echo "Подпись валидна"

          # Готовим содержимое DMG: само приложение + ярлык на «Программы».
          STAGING="dmg_staging"
          rm -rf "$STAGING"; mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "SEO-Анализатор" \
            -srcfolder "$STAGING" \
            -fs HFS+ \
            -format UDZO \
            -ov \
            "SEOAnalyzer.dmg"
          hdiutil verify "SEOAnalyzer.dmg" || true
          ls -lh SEOAnalyzer.dmg

      - name: Публикация релиза
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: SEO-Анализатор ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: SEOAnalyzer.dmg
          body: |
            ## SEO-Анализатор ${{ steps.ver.outputs.tag }}

            ### Установка
            1. Скачайте **`SEOAnalyzer.dmg`** ниже и откройте его.
            2. Перетащите **SEO-Анализатор** в папку **«Программы»**.

            ### Если macOS пишет «программа повреждена»
            Приложение не нотаризовано в Apple (нет платного Developer-аккаунта),
            поэтому Gatekeeper помечает скачанные файлы «карантином». Снимите его
            одной командой в Терминале — после этого приложение откроется нормально:

            ```
            xattr -cr /Applications/SEOAnalyzer.app
            ```

            Либо: правый клик по приложению → **Открыть** → **Открыть**.

            Встроенный механизм обновлений найдёт следующие релизы автоматически.
